<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coca</title>
    <link rel="stylesheet" href="style.css">
    <!--  -->
</head>

<body>

    <header>

        <div id="links-header"> <!-- div para links do lado esquerdo -->
            <div id="logo-header"><img src="./assets/images/Logo.png" alt="Logo"></div>
            <nav>
                <ul>
                    <li><a href="#"><span>About</span></a></li>
                    <li><a href="#">Blog</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </div>
        <div id="btn-header"> <!-- div para links do lado direito -->
            <a id="sign-in-btn" href="#">Sign In</a>
            <button><img src="./assets/icons/Menu.png" alt="Menu"></button>
        </div>

    </header>

    <main>

        <section id="introduction"> <!-- Introdução ao site -->
            <div id="introduction-content">
                <h3>Explore any kind of furnitures</h3>
                <h1>Better Furniture <br>
                    Better Living</h1>
                <div id="introduction-btn">
                    <a href="#">Check our projects</a>
                    <div id="right-arrow"><img src="./assets/icons/Short Right Arrow.png" alt="Seta"></div>
                </div>
            </div>
        </section>
        
        <section id="about">
            <div id="title">
                <h2>What we provide</h2>
            </div>
            <div id="about-items">
                <div class="about-item">
                    <img src="" alt="">
                    <h3></h3>
                    <p></p>
                    <div>
                        <a href="#">See more</a>
                        <img src="./assets/icons/" alt="">
                    </div>
                </div>
            </div>
        </section>
        
        <section id="products">

        </section>
        
        <section id="projects">

        </section>
        
        <section id="news">

        </section>
        
        <section id="testimonials">

        </section>
        
    </main>

    <footer>

        <div id="footer-top"> <!-- Parte superior à divisória do footer -->
            <div id="logo-footer"><img src="./assets/images/Logo.png" alt="Logo"></div>
            <div><h4>Better Furniture, Better Living</h4></div>
            <div id="footer-contact">

            </div>
            <div id="footer-website">

            </div>
            <div id="footer-products">

            </div>
        </div>
        <div id="footer-bottom"> <!-- Parte inferior à divisória do footer -->
            <div id="copyrights">

            </div>
            <div id="footer-policy">

            </div>
            <div id="footer-media">

            </div>
        </div>
        
    </footer>

</body>

</html>
